spring:
  config:
    import: optional:file:.env[.properties]
  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${SUPABASE_DB_URL}
    username: ${SUPABASE_DB_USERNAME}
    password: ${SUPABASE_DB_PASSWORD}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

mybatis:
  mapper-locations: classpath:/mapper/**/*.xml
  type-aliases-package: com.campusops.vo
  configuration:
    map-underscore-to-camel-case: true

jwt:
  secret: ${JWT_SECRET:campusops-local-jwt-secret-key-must-be-long-enough-for-hs256}
  expiration: 86400000

server:
  port: 8080

logging:
  level:
    com.campusops: debug
