spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${SUPABASE_DB_URL}
    username: ${SUPABASE_DB_USERNAME}
    password: ${SUPABASE_DB_PASSWORD}
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}

mybatis:
  mapper-locations: classpath:/mapper/**/*.xml
  type-aliases-package: com.campusops.vo
  configuration:
    map-underscore-to-camel-case: true

jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000

server:
  port: 8080

logging:
  level:
    com.campusops: debug
