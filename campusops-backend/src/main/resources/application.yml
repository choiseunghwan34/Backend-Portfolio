spring:
  config:
    import: optional:file:.env[.properties]
  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${SUPABASE_DB_URL}
    username: ${SUPABASE_DB_USERNAME}
    password: ${SUPABASE_DB_PASSWORD}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      username: ${REDIS_USERNAME:}
      password: ${REDIS_PASSWORD:}
      ssl:
        enabled: ${REDIS_SSL:false}
  mail:
    host: ${MAIL_HOST:}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS:true}

mybatis:
  mapper-locations: classpath:/mapper/**/*.xml
  type-aliases-package: com.campusops.vo
  configuration:
    map-underscore-to-camel-case: true

jwt:
  secret: ${JWT_SECRET:campusops-local-jwt-secret-key-must-be-long-enough-for-hs256}
  expiration: ${JWT_EXPIRATION:7200000}
  auto-login-expiration: ${JWT_AUTO_LOGIN_EXPIRATION:2592000000}

mail:
  from: ${MAIL_FROM:${MAIL_USERNAME:}}
  from-name: ${MAIL_FROM_NAME:CampusOps}
  debug-code-enabled: ${MAIL_DEBUG_CODE_ENABLED:false}

emailjs:
  enabled: ${EMAILJS_ENABLED:true}
  service-id: ${EMAILJS_SERVICE_ID:service_gf1ay9g}
  template-id: ${EMAILJS_TEMPLATE_ID:}
  public-key: ${EMAILJS_PUBLIC_KEY:}
  access-token: ${EMAILJS_ACCESS_TOKEN:}

app:
  frontend-url: ${APP_FRONTEND_URL:http://localhost:5173}

supabase:
  project-url: ${SUPABASE_PROJECT_URL:}
  service-role-key: ${SUPABASE_SERVICE_ROLE_KEY:}
  storage-bucket: ${SUPABASE_STORAGE_BUCKET:campusops-files}

gemini:
  api-key: ${GEMINI_API_KEY:}
  model: ${GEMINI_MODEL:gemini-2.0-flash}
  requests-per-minute: ${GEMINI_REQUESTS_PER_MINUTE:8}

server:
  port: 8080

logging:
  level:
    com.campusops: debug
